<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sally 💛</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
font-family:"Segoe UI",sans-serif;
background:#111b21;
overflow:hidden;
}

.chat-container{
height:100dvh;
display:flex;
flex-direction:column;
background:#0b141a;
}

/* HEADER */

.chat-header{
height:60px;
background:#202c33;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 14px;
color:white;
border-bottom:1px solid #2f3b43;
flex-shrink:0;
}

.profile{
display:flex;
align-items:center;
gap:10px;
}

.profile img{
width:42px;
height:42px;
border-radius:50%;
object-fit:cover;
}

.profile-info{
display:flex;
flex-direction:column;
}

.profile-info span{
font-size:17px;
}

.profile-info small{
font-size:12px;
color:#8696a0;
}

.reset-btn{
background:none;
border:none;
color:#8696a0;
font-size:14px;
cursor:pointer;
}

/* CHAT */

.messages{
flex:1;
overflow-y:auto;
padding:12px;

display:flex;
flex-direction:column;

background:
linear-gradient(
rgba(11,20,26,0.84),
rgba(11,20,26,0.84)
),

url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

scroll-behavior:smooth;
}

.message{
max-width:80%;
padding:8px 10px;
margin-bottom:10px;
border-radius:8px;
line-height:1.45;
font-size:14px;
white-space:pre-wrap;
word-wrap:break-word;

animation:fadeIn .15s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(5px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.user{
align-self:flex-end;
background:#005c4b;
color:#e9edef;
border-top-right-radius:2px;
}

.bot{
align-self:flex-start;
background:#202c33;
color:#e9edef;
border-top-left-radius:2px;
}

.time{
display:block;
text-align:right;
font-size:10px;
opacity:0.7;
margin-top:4px;
}

/* TYPING */

.typing{
font-size:22px;
letter-spacing:2px;
opacity:0.7;
}

/* INPUT */

.input-area{
background:#202c33;
padding:10px;
display:flex;
align-items:flex-end;
gap:8px;
flex-shrink:0;
}

textarea{
flex:1;

border:none;
outline:none;
resize:none;

background:#2a3942;
color:white;

border-radius:24px;

padding:12px 16px;

font-size:14px;
font-family:inherit;

min-height:45px;
max-height:120px;

overflow-y:auto;
}

.send-btn{
width:46px;
height:46px;

border:none;
border-radius:50%;

background:#00a884;
color:white;

font-size:18px;

cursor:pointer;
transition:.2s;
}

.send-btn:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="chat-container">

<!-- HEADER -->

<div class="chat-header">

<div class="profile">

<img src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png">

<div class="profile-info">
<span>Sally 💛</span>
<small id="statusText">online</small>
</div>

</div>

<button
class="reset-btn"
onclick="clearMemory()"
>
Reset
</button>

</div>

<!-- CHAT -->

<div
class="messages"
id="messages"
></div>

<!-- INPUT -->

<div class="input-area">

<textarea
id="userInput"
rows="1"
placeholder="Message Sally..."
></textarea>

<button
class="send-btn"
onclick="sendMessage()"
>
➤
</button>

</div>

</div>

<script>
const API_KEY="J2fFqLPBXCDBepxZ7WaehyaGuSSc4DeM";
const API_URL="https://api.mistral.ai/v1/chat/completions";

const messages=document.getElementById("messages");
const textInput=document.getElementById("textInput");
const imageInput=document.getElementById("imageInput");

let conversation=JSON.parse(localStorage.getItem("sally_vision_memory"))||[{
role:"system",
content:"You are Sally. Warm, natural, remembers context."
}];

function saveMemory(){
localStorage.setItem("sally_vision_memory",JSON.stringify(conversation));
}

function addMessage(content,type,isImage=false){
const div=document.createElement("div");
div.className="msg "+type;
if(isImage){
div.innerHTML=`<img src="${content}" class="preview">`;
}else{
div.textContent=content;
}
messages.appendChild(div);
messages.scrollTop=messages.scrollHeight;
}

conversation.forEach(m=>{
if(m.image) addMessage(m.image,"user",true);
else if(m.role==="user") addMessage(m.content,"user");
else if(m.role==="assistant") addMessage(m.content,"bot");
});

function fileToBase64(file){
return new Promise(resolve=>{
const reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.readAsDataURL(file);
});
}

async function sendMessage(){
const text=textInput.value.trim();
const file=imageInput.files[0];

if(!text && !file) return;

if(text){
addMessage(text,"user");
conversation.push({role:"user",content:text});
}

let imageData=null;

if(file){
imageData=await fileToBase64(file);
addMessage(imageData,"user",true);
conversation.push({
role:"user",
content:"[Image Uploaded]",
image:imageData
});
}

saveMemory();

textInput.value="";

const typing=document.createElement("div");
typing.className="msg bot";
typing.textContent="Analyzing...";
messages.appendChild(typing);

try{

let content=[];

if(text){
content.push({type:"text",text:text});
}

if(file){
content.push({
type:"image_url",
image_url:imageData
});
}

const response=await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"mistral-small-latest",
messages:[{
role:"user",
content:content.length?content:[{type:"text",text:text}]
}]
})
});

const data=await response.json();

typing.remove();

const reply=data.choices?.[0]?.message?.content || "No response";

addMessage(reply,"bot");

conversation.push({
role:"assistant",
content:reply
});

saveMemory();

}catch(e){

typing.remove();

addMessage("Connection/API error","bot");

console.error(e);
}
}
</script>
</body>
</html>
